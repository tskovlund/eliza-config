name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate secrets.nix exists
        run: |
          if [ ! -f "secrets/secrets.nix" ]; then
            echo "ERROR: secrets/secrets.nix is missing"
            exit 1
          fi
          echo "secrets.nix present"

      - name: Validate plaintext skills
        run: |
          errors=0
          for skill in delegation dep-update docs linear-operations memory-management \
                       morning-briefing notification-routing onboard pr-review repo-sync \
                       self-improvement skill-management system-health test-write; do
            if [ ! -f "skills/${skill}/SKILL.md" ]; then
              echo "ERROR: skills/${skill}/SKILL.md is missing"
              errors=$((errors + 1))
            elif [ ! -s "skills/${skill}/SKILL.md" ]; then
              echo "ERROR: skills/${skill}/SKILL.md is empty"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "$errors skill(s) have issues"
            exit 1
          fi
          echo "All skills present"

      - name: Validate encrypted workspace files
        run: |
          errors=0
          for file in AGENTS IDENTITY SOUL TOOLS USER; do
            if [ ! -f "secrets/workspace-${file}.age" ]; then
              echo "ERROR: secrets/workspace-${file}.age is missing"
              errors=$((errors + 1))
            elif [ ! -s "secrets/workspace-${file}.age" ]; then
              echo "ERROR: secrets/workspace-${file}.age is empty"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "$errors workspace file(s) have issues"
            exit 1
          fi
          echo "All workspace secrets present"
